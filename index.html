<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Admin Login</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ff9999;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            border: 3px solid #610000;
            padding: 30px;
            background-color: #111827;
            box-shadow: 0 0 25px rgba(97, 0, 0, 0.5);
            text-align: center;
            width: 350px;
            min-height: 200px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .box.active { 
            display: flex !important; 
        }
        .title { 
            font-weight: bold; 
            margin-bottom: 20px; 
            white-space: pre-wrap; 
            color: #ffb3b3;
        }
        .input-code {
            background: #1f2937 !important;
            border: 2px solid #610000 !important;
            color: #ffffff !important;
            text-align: center !important;
            font-size: 24px !important;
            letter-spacing: 10px !important;
            width: 180px !important;
            padding: 10px !important;
            outline: none !important;
            margin-bottom: 20px !important;
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            box-sizing: border-box;
        }
        .btn {
            background: #610000;
            color: #ffffff;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn:hover { 
            background: #8a0000; 
        }
        .progress-bar { 
            font-size: 14px; 
            margin: 15px 0; 
            word-break: break-all;
            color: #610000;
        }
        .btn-group { 
            display: flex; 
            gap: 20px; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>

    <!-- 화면 1: 패스워드 입력 -->
    <div id="step-input" class="box active">
        <div class="title">Enter your password:</div>
        <input type="password" id="password" class="input-code" maxlength="4" placeholder="••••" autocomplete="off">
        <button class="btn" onclick="checkPassword()">Verify</button>
    </div>

    <!-- 화면 2: Checking 및 프로그레스 바 -->
    <div id="step-checking" class="box">
        <div style="color: #610000;">▄▄▄▄▄▄▄▄▄▄▄▄▄</div>
        <div id="status-text" class="title" style="margin: 10px 0;">Checking…</div>
        <div style="color: #610000;">▂▂▂▂▂▂▂▂▂▂▂▂▂</div>
        <div id="progress" class="progress-bar">◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻</div>
        <div style="color: #610000;">▀▀▀▀▀▀▀▀▀▀▀▀▀</div>
    </div>

    <!-- 화면 3: 파일 오픈 여부 확인 -->
    <div id="step-confirm" class="box">
        <div class="title">Logging in as Administrator.<br><br>Do you want to open this file?</div>
        <div class="btn-group">
            <button class="btn" onclick="goToFile()">Yes</button>
            <button class="btn" onclick="goToStart()">No</button>
        </div>
    </div>

    <script>
        const totalBlocks = 19;
        
        function checkPassword() {
            const pw = document.getElementById('password').value;
            if (pw === '0709') {
                showStep('step-checking');
                startLoading();
            } else {
                alert('무단 접근: 패스워드가 틀렸습니다.');
                document.getElementById('password').value = '';
            }
        }

        function showStep(stepId) {
            document.querySelectorAll('.box').forEach(box => box.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function startLoading() {
            const progressDiv = document.getElementById('progress');
            const statusText = document.getElementById('status-text');
            let current = 0;

            progressDiv.innerText = "◻".repeat(totalBlocks);
            statusText.innerText = "Checking…";

            const interval = setInterval(() => {
                current++;
                let filled = "◼".repeat(current);
                let empty = "◻".repeat(totalBlocks - current);
                progressDiv.innerText = filled + empty;

                if (current >= totalBlocks) {
                    clearInterval(interval);
                    statusText.innerText = "Verified.";
                    
                    setTimeout(() => {
                        showStep('step-confirm');
                    }, 800);
                }
            }, 100);
        }

        function goToFile() {
            // 브라우저 캐시 우회 및 다이렉트 웹 주소 강제 지정
            const cleanNotionUrl = "https://notion.so";
            window.location.href = cleanNotionUrl;
        }

        function goToStart() {
            showStep('step-checking');
            const statusText = document.getElementById('status-text');
            const progressDiv = document.getElementById('progress');
            
            statusText.innerText = "Loading…";
            progressDiv.innerText = "◻".repeat(totalBlocks);

            setTimeout(() => {
                document.getElementById('password').value = '';
                showStep('step-input');
            }, 2000);
        }
    </script>
</body>
</html>
