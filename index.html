<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            border: 2px solid #00ff66;
            padding: 30px;
            background-color: #111827;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
            text-align: center;
            width: 350px;
            min-height: 200px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .active { display: flex; }
        .title { font-weight: bold; margin-bottom: 20px; white-space: pre-wrap; }
        .input-code {
            background: transparent;
            border: 2px solid #00ff66;
            color: #00ff66;
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
            width: 150px;
            padding: 5px;
            outline: none;
            margin-bottom: 20px;
        }
        .btn {
            background: #00ff66;
            color: #0b0f19;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .btn:hover { background: #00cc52; }
        .progress-bar { font-size: 14px; margin: 15px 0; word-break: break-all; }
        .btn-group { display: flex; gap: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- 화면 1: 패스워드 입력 -->
    <div id="step-input" class="box active">
        <div class="title">Enter your password:</div>
        <input type="password" id="password" class="input-code" maxlength="4" placeholder="••••">
        <button class="btn" onclick="checkPassword()">Verify</button>
    </div>

    <!-- 화면 2: Checking 및 프로그레스 바 -->
    <div id="step-checking" class="box">
        <div>▄▄▄▄▄▄▄▄▄▄▄▄▄</div>
        <div id="status-text" class="title" style="margin: 10px 0;">Checking…</div>
        <div>▂▂▂▂▂▂▂▂▂▂▂▂▂</div>
        <div id="progress" class="progress-bar">◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻◻</div>
        <div>▀▀▀▀▀▀▀▀▀▀▀▀▀</div>
    </div>

    <!-- 화면 3: 파일 오픈 여부 확인 -->
    <div id="step-confirm" class="box">
        <div class="title">Logging in as Administrator.<br><br>◌<br><br>Do you want to open this file?</div>
        <div class="btn-group">
            <button class="btn" onclick="goToFile()">Yes</button>
            <button class="btn" onclick="goToStart()">No</button>
        </div>
    </div>

    <script>
        const totalBlocks = 19;
        // 구글 문서 주소를 여기에 정상적으로 반영했습니다.
        const targetFileUrl = "https://google.com"; 

        function checkPassword() {
            const pw = document.getElementById('password').value;
            if (pw === '0709') {
                showStep('step-checking');
                startLoading();
            } else {
                alert('무단 접근: 패스워드가 틀렸습니다.');
                document.getElementById('password').value = '';
            }
        }

        function showStep(stepId) {
            document.querySelectorAll('.box').forEach(box => box.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
        }

        function startLoading() {
            const progressDiv = document.getElementById('progress');
            const statusText = document.getElementById('status-text');
            let current = 0;

            progressDiv.innerText = "◻".repeat(totalBlocks);
            statusText.innerText = "Checking…";

            const interval = setInterval(() => {
                current++;
                let filled = "◼".repeat(current);
                let empty = "◻".repeat(totalBlocks - current);
                progressDiv.innerText = filled + empty;

                if (current >= totalBlocks) {
                    clearInterval(interval);
                    // 다 차는 '동시에' Verified. 문구로 변경
                    statusText.innerText = "Verified.";
                    
                    // 0.8초 후 다음 화면으로 부드럽게 전환
                    setTimeout(() => {
                        showStep('step-confirm');
                    }, 800);
                }
            }, 100);
        }

        function goToFile() {
            window.location.href = targetFileUrl;
        }

        function goToStart() {
            showStep('step-checking');
            const statusText = document.getElementById('status-text');
            const progressDiv = document.getElementById('progress');
            
            statusText.innerText = "Loading…";
            progressDiv.innerText = "◻".repeat(totalBlocks);

            setTimeout(() => {
                document.getElementById('password').value = '';
                showStep('step-input');
            }, 2000);
        }
    </script>
</body>
</html>
